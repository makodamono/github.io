<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" width="360" height="72" role="img" aria-label="Sample Works — 株式会社サンプルワークス">
  <style>
    .sw { font-family: Inter, Arial, sans-serif; font-size: 50px; font-weight: 800; letter-spacing: -3px; fill: #11151a; }
    .slash { stroke: #11151a; stroke-width: 4; stroke-linecap: round; }
    .name { font-family: Inter, Arial, sans-serif; font-size: 34px; font-weight: 800; letter-spacing: -1.4px; fill: #2e9a4f; }
    .cap { font-family: "JetBrains Mono", "Courier New", monospace; font-size: 10px; font-weight: 500; letter-spacing: 4.8px; fill: #7b817b; }
  </style>
  <text class="sw" x="0" y="48">SW</text>
  <line class="slash" x1="83" y1="16" x2="70" y2="56"></line>
  <text class="name" x="104" y="44">works</text>
  <text class="cap" x="106" y="62">MULTIDISCIPLINARY STUDIO</text>
